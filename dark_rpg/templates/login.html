{% extends "base.html" %}
{% block title %}Enter the Veil — Valdrath{% endblock %}

{% block content %}
<div class="auth-wrapper">

    <div class="auth-sigil" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="50" fill="none" stroke="var(--gold)" stroke-width="1" opacity="0.4"/>
            <circle cx="60" cy="60" r="38" fill="none" stroke="var(--gold)" stroke-width="0.5" opacity="0.3"/>
            <polygon points="60,15 70,45 100,45 77,63 85,93 60,76 35,93 43,63 20,45 50,45"
                     fill="none" stroke="var(--gold)" stroke-width="1.2" opacity="0.6"/>
            <circle cx="60" cy="60" r="5" fill="var(--gold)" opacity="0.8"/>
        </svg>
    </div>

    <div class="auth-card">
        <h1 class="auth-title">Valdrath</h1>
        <p class="auth-subtitle">The Veil Awaits</p>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Bound Name</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="Enter your name" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Blood Oath</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="Your oath in shadow" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn--primary btn--full">
                <span>Enter the Darkness</span>
                <svg class="btn-arrow" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <p class="auth-switch">
            No name in the ledger?
            <a href="{{ url_for('register') }}" class="text-link">Forge your legend</a>
        </p>

        <div class="auth-accounts">
            <p class="auth-accounts-title">Test Accounts</p>
            <div class="account-chips">
                <span class="chip">fighter / fighter123</span>
                <span class="chip">tank / tank123</span>
                <span class="chip">mage / mage123</span>
            </div>
        </div>
    </div>

</div>
{% endblock %}
